<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý thiết bị – PX Tuyển than 4</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Bắt tay Google trước khi iframe load → giảm ~200-500ms -->
  <link rel="preconnect" href="https://lookerstudio.google.com">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://lookerstudio.google.com">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ========== THANH TIÊU ĐỀ ========== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1e293b;
      border-bottom: 2px solid #fbbf24;
      flex-shrink: 0;
      padding-top: max(10px, env(safe-area-inset-top));
    }

    .btn-back {
      display: flex;
      align-items: center;
      color: #fbbf24;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(251,191,36,0.1);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:active { opacity: 0.7; }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .header-title span {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(251,191,36,0.1);
      border: 1px solid #fbbf24;
      color: #fbbf24;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-refresh:active { opacity: 0.7; }

    .spin { display: inline-block; }
    .loading .spin { animation: xoay 1s linear infinite; }
    @keyframes xoay { to { transform: rotate(360deg); } }

    /* ========== 2 NÚT TAB CHUYỂN TRANG ========== */
    .tab-bar {
      display: flex;
      background: #1e293b;
      flex-shrink: 0;
      border-bottom: 1px solid #0f172a;
    }

    .tab {
      flex: 1;              /* Mỗi tab chiếm nửa chiều ngang */
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;       /* Màu xám khi chưa chọn */
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
    }

    /* Tab đang được chọn */
    .tab.active {
      color: #fbbf24;                    /* Chữ vàng */
      border-bottom: 3px solid #fbbf24;  /* Gạch chân vàng */
      background: rgba(251,191,36,0.05); /* Nền vàng rất nhạt */
    }
    .tab:active { opacity: 0.7; }

    /* ========== KHUNG CHỨA IFRAME ========== */
    .iframe-wrapper {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ========== SKELETON – MÀN HÌNH CHỜ ========== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 20px 16px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.an {
      opacity: 0;
      pointer-events: none;
    }

    /* Hiệu ứng ánh sáng quét qua */
    .skeleton {
      background: linear-gradient(
        90deg,
        #1e293b 25%,
        #2d3f55 50%,
        #1e293b 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .sk-row { display: flex; gap: 12px; width: 100%; }
    .sk-card { flex: 1; height: 80px; border-radius: 10px; }
    .sk-chart { width: 100%; height: 180px; }
    .sk-table-row { width: 100%; height: 36px; border-radius: 6px; }
    .sk-table-row:nth-child(2) { width: 90%; }
    .sk-table-row:nth-child(3) { width: 95%; }
    .sk-table-row:nth-child(4) { width: 85%; }
    .sk-text { color: #475569; font-size: 13px; margin-top: 8px; }

    /* ========== IFRAME ========== */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ========== HOME BAR IPHONE ========== */
    .safe-bottom {
      height: env(safe-area-inset-bottom);
      background: #1e293b;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- THANH TIÊU ĐỀ -->
  <div class="header">
    <a class="btn-back" href="index.html">← Quay lại</a>

    <div class="header-title">
      Quản lý thiết bị
      <span>PX Tuyển than 4</span>
    </div>

    <button class="btn-refresh" id="btnRefresh" onclick="laMoi()">
      <span class="spin">🔄</span> Mới
    </button>
  </div>

  <!-- 2 NÚT TAB CHUYỂN TRANG
       Tab nào có class "active" → được gạch chân vàng -->
  <div class="tab-bar">
    <button class="tab active" id="tab1" onclick="doiTab(1)">
      📊 Tổng hợp<br>toàn nhà máy
    </button>
    <button class="tab" id="tab2" onclick="doiTab(2)">
      🔧 Chi tiết<br>theo thiết bị
    </button>
  </div>

  <!-- VÙNG CHỨA IFRAME -->
  <div class="iframe-wrapper">

    <!-- SKELETON – hiện khi đang tải, ẩn khi xong -->
    <div class="loading-overlay" id="loading">
      <div class="sk-row">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
      <div class="skeleton sk-chart"></div>
      <div class="skeleton sk-table-row"></div>
      <div class="skeleton sk-table-row"></div>
      <div class="skeleton sk-table-row"></div>
      <div class="skeleton sk-table-row"></div>
      <p class="sk-text">Đang tải dữ liệu...</p>
    </div>

    <!-- IFRAME LOOKER STUDIO -->
    <iframe
      id="khung-bao-cao"
      src="https://lookerstudio.google.com/embed/reporting/2fa9415a-3a55-40fe-aa57-f8b7d91fc2e6/page/p_r9ce9gmt1d"
      frameborder="0"
      style="border:0"
      allowfullscreen
      loading="lazy"
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
      onload="khuatLoading()">
    </iframe>

  </div>

  <div class="safe-bottom"></div>

  <script>
    // Link 2 trang Looker Studio
    const TRANG = {
      1: "https://lookerstudio.google.com/embed/reporting/2fa9415a-3a55-40fe-aa57-f8b7d91fc2e6/page/p_r9ce9gmt1d",
      // ↑ Trang 1: Tổng hợp toàn nhà máy
      2: "https://lookerstudio.google.com/embed/reporting/2fa9415a-3a55-40fe-aa57-f8b7d91fc2e6/page/nxEsF"
      // ↑ Trang 2: Chi tiết theo thiết bị
    };

    // Ẩn skeleton khi iframe tải xong
    function khuatLoading() {
      document.getElementById('loading').classList.add('an');
    }

    // Chuyển tab
    function doiTab(so) {
      const khung = document.getElementById('khung-bao-cao');
      const loading = document.getElementById('loading');

      // Cập nhật trạng thái active cho 2 tab
      document.getElementById('tab1').classList.toggle('active', so === 1);
      document.getElementById('tab2').classList.toggle('active', so === 2);

      // Hiện lại skeleton khi chuyển trang
      loading.classList.remove('an');

      // Chuyển iframe sang link tương ứng
      khung.src = TRANG[so];
    }

    // Làm mới trang đang xem
    function laMoi() {
      const btn = document.getElementById('btnRefresh');
      const khung = document.getElementById('khung-bao-cao');
      const loading = document.getElementById('loading');

      loading.classList.remove('an');
      btn.classList.add('loading');
      khung.src = khung.src;

      setTimeout(() => btn.classList.remove('loading'), 2000);
    }
  </script>

</body>
</html>
