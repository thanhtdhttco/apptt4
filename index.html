<style>
  /* Lớp phủ nền xanh tối để hộp trắng nổi bật */
  #man-hinh-khoa {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a192f; 
    z-index: 100000;
    display: flex; align-items: center; justify-content: center;
    font-family: Arial, sans-serif;
  }

  /* Hộp đăng nhập Trắng hoàn toàn, sắc nét */
  .hop-dang-nhap {
    background: #ffffff;
    padding: 30px;
    border-radius: 4px; /* Bo góc nhẹ nhìn cứng cáp hơn */
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
    width: 320px;
    border-top: 5px solid #007bff; /* Điểm nhấn viền xanh chuyên nghiệp phía trên */
  }

  .hop-dang-nhap img { width: 60px; margin-bottom: 15px; }

  /* Tiêu đề màu xanh đen đậm */
  .hop-dang-nhap h3 {
    margin: 0 0 10px 0;
    color: #1a2a44;
    font-size: 18px;
    text-transform: uppercase;
  }

  /* Dòng cảnh báo màu đỏ đậm, rõ ràng */
  .canh-bao-noi-bo {
    color: #d32f2f;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 20px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* Ô nhập mật khẩu trắng, viền rõ */
  .hop-dang-nhap input {
    width: 100%; padding: 12px; margin-bottom: 15px;
    background: #ffffff;
    color: #000; 
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 18px;
    box-sizing: border-box;
    outline: none;
    text-align: center;
  }

  /* Khi click vào ô nhập mật khẩu */
  .hop-dang-nhap input:focus { border-color: #007bff; }

  /* Nút bấm xanh đậm, không hiệu ứng rườm rà */
  .hop-dang-nhap button {
    width: 100%; padding: 12px; 
    background: #007bff; 
    color: white;
    border: none; border-radius: 4px; 
    font-weight: bold; cursor: pointer;
    font-size: 15px;
  }

  #thong-bao-sai {
    color: #d32f2f; font-size: 13px; margin-top: 10px; display: none;
  }
</style>

<div id="man-hinh-khoa">
  <div class="hop-dang-nhap">
    <img src="icon-180.png">
    <h3>XÁC THỰC TRUY CẬP</h3>
    
    <p class="canh-bao-noi-bo">
      ⚠️ PHẦN MỀM NỘI BỘ<br>YÊU CẦU ĐĂNG NHẬP ĐỂ SỬ DỤNG
    </p>

    <input type="password" id="ma-pass" placeholder="Mật khẩu..." autofocus>
    <button onclick="kiemTra()">VÀO HỆ THỐNG</button>
    <p id="thong-bao-sai">❌ Sai mật khẩu!</p>
  </div>
</div>

<script>
  const PASS_CUA_BAC = "tt4"; 
  const appGoc = document.querySelector('.app');
  const lopPhu = document.getElementById('man-hinh-khoa');
  const oNhap = document.getElementById('ma-pass');

  // Ẩn nội dung ngay lập tức
  if (appGoc) appGoc.style.visibility = 'hidden';

  function kiemTra() {
    if (oNhap.value === PASS_CUA_BAC) {
      // Xóa thẳng, không hiệu ứng để đạt tốc độ cao nhất
      lopPhu.remove();
      if (appGoc) appGoc.style.visibility = 'visible';
    } else {
      document.getElementById('thong-bao-sai').style.display = 'block';
      oNhap.style.border = '1px solid red';
      oNhap.value = '';
      oNhap.focus();
    }
  }

  oNhap.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') kiemTra();
  });
</script>
